# ══════════════════════════════════════════════════════════════════════
# NetworkPolicies — Projet mon-app
# Namespaces couverts : mon-app, argocd, monitoring
# ══════════════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────────────
# NAMESPACE : mon-app
# ──────────────────────────────────────────────────────────────────────

# Politique 1 : Bloquer tout le trafic entrant par défaut
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Ingress

---
# Politique 2 : Bloquer tout le trafic sortant par défaut
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Egress

---
# Politique 3 : Autoriser DNS (obligatoire pour toute résolution de nom)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

---
# Politique 4 : Autoriser le trafic HTTP entrant + ports Linkerd vers mon-app
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-http-mon-app
  namespace: mon-app
spec:
  podSelector:
    matchLabels:
      app: mon-app
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - protocol: TCP
      port: 80       # HTTP application
    - protocol: TCP
      port: 4191     # Linkerd health check
    - protocol: TCP
      port: 4143     # Linkerd proxy (inbound)
    - protocol: TCP
      port: 4140     # Linkerd proxy (outbound)

---
# Politique 5 : Autoriser le trafic interne entre pods du même namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}

---
# Politique 6 : Autoriser le trafic entrant depuis ArgoCD
# (vérification de l'état des pods, health checks)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argocd-ingress
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: argocd

---
# Politique 7 : Autoriser le trafic entrant depuis kube-system
# (health probes kubelet, metrics-server)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kube-system-ingress
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system

---
# Politique 8 : Autoriser le trafic entrant depuis monitoring
# (scraping Prometheus des métriques de mon-app)
# NOUVEAU — sans cette politique Prometheus ne peut pas collecter les métriques
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-ingress
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 8080     # port metrics de mon-app (à adapter si différent)
    - protocol: TCP
      port: 9090     # port metrics Prometheus alternatif

---
# Politique 9 : Autoriser le trafic entrant depuis kubernetes-dashboard
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kubernetes-dashboard-ingress
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kubernetes-dashboard

---
# Politique 10 : Autoriser le trafic sortant vers Linkerd (control plane)
# CORRIGÉE — to et ports sont maintenant combinés dans la même règle
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-linkerd-egress
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: linkerd
    ports:
    - protocol: TCP
      port: 4191     # Linkerd health check / admin
    - protocol: TCP
      port: 4143     # Linkerd proxy (inbound)
    - protocol: TCP
      port: 4140     # Linkerd proxy (outbound)
    - protocol: TCP
      port: 8086     # Linkerd tap / diagnostics

---
# Politique 11 : Autoriser le trafic sortant vers ArgoCD
# NOUVEAU — corrige l'erreur "no route to host" sur port 8081
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-argocd
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: argocd
    ports:
    - protocol: TCP
      port: 8081     # argocd-repo-server
    - protocol: TCP
      port: 8082     # argocd-server metrics
    - protocol: TCP
      port: 443      # HTTPS ArgoCD API

---
# Politique 12 : Autoriser le trafic HTTPS sortant externe
# (pull d'images GHCR, GitHub, registries)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-egress
  namespace: mon-app
spec:
  podSelector:
    matchLabels:
      app: mon-app
  policyTypes:
  - Egress
  egress:
  - ports:
    - protocol: TCP
      port: 443      # HTTPS
    - protocol: TCP
      port: 80       # HTTP (à restreindre si inutile)

---
# ──────────────────────────────────────────────────────────────────────
# NAMESPACE : argocd
# NOUVEAU — ArgoCD n'avait aucune politique, tout était ouvert par défaut
# ──────────────────────────────────────────────────────────────────────

# Politique 13 : Autoriser tout le trafic interne ArgoCD
# ArgoCD a besoin de communiquer librement entre ses composants
# (server, repo-server, application-controller, dex, redis, notifications)
# et vers l'API Kubernetes, les repos Git, et les clusters gérés
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argocd-internal
  namespace: argocd
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {}
  egress:
  - {}

---
# ──────────────────────────────────────────────────────────────────────
# NAMESPACE : monitoring
# ──────────────────────────────────────────────────────────────────────

# Politique 14 : Autoriser tout le trafic dans monitoring
# Prometheus, Grafana, Alertmanager, node-exporter, kube-state-metrics
# ont besoin de se joindre librement et de scraper tous les namespaces
# NOTE : à affiner en production avec des règles par composant
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-monitoring
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {}
  egress:
  - {}