# ══════════════════════════════════════════════════════════
# Politique 1 : Bloquer tout le trafic entrant par défaut
# ══════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Ingress

---
# ══════════════════════════════════════════════════════════
# Politique 2 : Autoriser HTTP + Linkerd vers mon-app
# ══════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-http-mon-app
  namespace: mon-app
spec:
  podSelector:
    matchLabels:
      app: mon-app
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - protocol: TCP
      port: 80       # HTTP app
    - protocol: TCP
      port: 4191     # Linkerd health check
    - protocol: TCP
      port: 4143     # Linkerd proxy traffic
    - protocol: TCP
      port: 4140     # Linkerd outbound proxy

---
# ══════════════════════════════════════════════════════════
# Politique 3 : Autoriser trafic depuis namespace argocd
# (pour que Argo CD puisse vérifier l'état des pods)
# ══════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argocd-ingress
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: argocd

---
# ══════════════════════════════════════════════════════════
# Politique 4 : Autoriser trafic depuis kube-system
# (pour health probes de Kubernetes)
# ══════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kube-system-ingress
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system

---
# ══════════════════════════════════════════════════════════
# Politique 5 : Autoriser trafic interne entre pods mon-app
# ══════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}

---
# ══════════════════════════════════════════════════════════
# Politique 6 : Bloquer tout le trafic sortant par défaut
# ══════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Egress

---
# ══════════════════════════════════════════════════════════
# Politique 7 : Autoriser DNS (obligatoire)
# ══════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

---
# ══════════════════════════════════════════════════════════
# Politique 8 : Autoriser trafic sortant externe
# (HTTPS vers GHCR, GitHub, etc.)
# ══════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-egress
  namespace: mon-app
spec:
  podSelector:
    matchLabels:
      app: mon-app
  policyTypes:
  - Egress
  egress:
  - ports:
    - protocol: TCP
      port: 443    # HTTPS
    - protocol: TCP
      port: 80     # HTTP

---
# ══════════════════════════════════════════════════════════
# Politique 9 : Autoriser Linkerd egress (control plane)
# ══════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-linkerd-egress
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: linkerd
  - ports:
    - protocol: TCP
      port: 4191
    - protocol: TCP
      port: 4143
    - protocol: TCP
      port: 4140
    - protocol: TCP
      port: 8086


apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kubernetes-dashboard
  namespace: mon-app
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kubernetes-dashboard


apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-monitoring
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {}
  egress:
  - {}




